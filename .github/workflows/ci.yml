name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pymysql psycopg2-binary

      - name: Debug - check Python version and imports
        run: |
          python --version
          python -c "import sys; print(sys.path)"
          python -c "import dbskiter; print('dbskiter imported OK')"
          python -c "from dbskiter.shared.sql_fingerprint import SQLFingerprinter; print('SQLFingerprinter imported OK')"

      - name: Run tests
        run: |
          python -m unittest discover -s tests/unit -p "*.py" -v
          python -m unittest tests.test_imports tests.test_models tests.test_error_handler tests.test_query_result tests.test_sql_dialect tests.test_validators tests.test_sql_fingerprint tests.test_sql_validation tests.test_security_injection tests.test_cache tests.test_report_generator tests.test_scheduler_backup tests.test_sql_validator -v