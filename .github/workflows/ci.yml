name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: |
          python -m pytest tests/test_imports.py tests/test_models.py tests/test_error_handler.py tests/test_query_result.py tests/test_sql_dialect.py tests/test_validators.py tests/test_sql_fingerprint.py tests/test_sql_validation.py tests/test_security_injection.py tests/test_cache.py tests/test_report_generator.py tests/test_scheduler_backup.py tests/test_sql_validator.py tests/unit/ -v --tb=short