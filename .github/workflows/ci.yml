name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pymysql psycopg2-binary

      - name: Run tests
        run: |
          echo "=== Python info ==="
          python --version
          which python
          pwd
          ls -la
          echo "=== dbskiter info ==="
          python -c "import dbskiter; print('Version:', dbskiter.__version__)"
          echo "=== Simple test ==="
          python -c "
from dbskiter.shared.sql_fingerprint import SQLFingerprinter
fp = SQLFingerprinter()
result = fp.fingerprint('SELECT * FROM users WHERE id = 123')
print('Fingerprint:', result.fingerprint)
assert result.fingerprint == 'SELECT * FROM users WHERE id=?', f'Got: {result.fingerprint}'
print('OK')
"
          echo "=== pytest version ==="
          python -m pytest --version
          echo "=== Run test_imports ==="
          cd /home/runner/work/dbskiter/dbskiter 2>/dev/null || cd ${{ github.workspace }}
          python -m pytest tests/test_imports.py -v --tb=long 2>&1 | head -50