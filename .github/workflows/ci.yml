name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 dbskiter/ --count --statistics

      - name: Verify imports
        run: |
          python -c "
          from dbskiter.db_diagnose import DiagnoseSkill
          from dbskiter.db_monitor import MonitorSkill
          from dbskiter.db_security import SecuritySkill
          from dbskiter.db_scheduler import SchedulerSkill
          from dbskiter.sql_master import SQLMasterSkill
          from dbskiter.db_inspector import InspectorSkill
          from dbskiter.db_lock_analyzer import LockAnalyzerSkill
          from dbskiter.db_sql_auditor import SQLAuditorSkill
          print('All 8 skill imports OK')
          "

      - name: Test with pytest (coverage)
        run: |
          python -m pytest tests/unit/ tests/test_imports.py tests/test_models.py tests/test_error_handler.py tests/test_query_result.py tests/test_sql_dialect.py tests/test_validators.py tests/test_sql_fingerprint.py tests/test_sql_validation.py tests/test_security_injection.py tests/test_cache.py tests/test_report_generator.py tests/test_scheduler_backup.py -v --tb=short --cov=dbskiter --cov-report=term --cov-fail-under=20

  benchmark:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run benchmarks
        run: |
          python -m pytest tests/test_benchmarks.py -v -m benchmark --tb=short

  integration:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pymysql psycopg2-binary

      - name: Start MySQL + PostgreSQL
        run: |
          docker compose --profile=test up -d
          echo "Waiting for databases to be ready..."
          sleep 15

      - name: Run integration tests
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3307
          MYSQL_USER: root
          MYSQL_PASSWORD: root
          MYSQL_DATABASE: test
          PG_HOST: 127.0.0.1
          PG_PORT: 5433
          PG_USER: postgres
          PG_PASSWORD: postgres
          PG_DATABASE: test
        run: |
          python -m pytest tests/integration/test_docker_db.py -v --tb=short

      - name: Cleanup
        if: always()
        run: docker compose down

  publish:
    runs-on: ubuntu-latest
    needs: [test, benchmark]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: |
          python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          twine upload dist/*