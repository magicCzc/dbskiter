name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pymysql psycopg2-binary

      - name: Debug - check Python version and imports
        run: |
          python --version
          python -c "import sys; print(sys.path)"
          python -c "import dbskiter; print('dbskiter imported OK')"
          python -c "from dbskiter.shared.sql_fingerprint import SQLFingerprinter; print('SQLFingerprinter imported OK')"

      - name: Run tests
        run: |
          python -m pytest tests/test_imports.py -v --tb=short -o asyncio_mode=auto