repos:
  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3
        args: [--line-length=120]

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: [--config=.flake8]

  - repo: local
    hooks:
      - id: check-bare-except
        name: Check for bare except
        description: Disallow bare `except:` clauses
        entry: python scripts/check_bare_except.py
        language: python
        types: [python]